name: Construcción de imagen y despliegue con Docker en EC2
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
 
jobs:
  build:
    name: Construir imagen de Docker y subir al repositorio
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
 
      - name: Login to Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: patriciop98/github-actions-docker:flaskapp
 
      - name: Deployment
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            docker image pull patriciop98/github-actions-docker:flaskapp
            docker container stop contflaskpablo
            docker container rm contflaskpablo
            docker container run -d --name contflaskpablo -p 80:5000 patriciop98/github-actions-docker:flaskapp
          

